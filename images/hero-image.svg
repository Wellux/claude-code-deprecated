<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A0E3;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0073b6;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#152b38;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c87c3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" rx="20" fill="#f5f5f5"/>
  
  <!-- Abstract elements -->
  <circle cx="150" cy="300" r="100" fill="url(#grad1)" />
  <circle cx="450" cy="100" r="80" fill="url(#grad1)" opacity="0.6" />
  
  <!-- Main graphic - AI Brain -->
  <g transform="translate(250, 180) scale(0.8)">
    <!-- Brain outline -->
    <path d="M100,50 C120,30 150,20 180,30 C210,10 250,10 280,30 C310,20 340,30 360,50 C380,80 380,120 360,150 
             C380,180 370,220 340,240 C320,260 290,270 260,260 C230,280 190,280 160,260 C130,270 100,260 80,240 
             C50,220 40,180 60,150 C40,120 40,80 60,50 C70,40 90,30 100,50 Z" 
          fill="url(#grad3)" stroke="#ffffff" stroke-width="3"/>
    
    <!-- Circuit lines -->
    <path d="M100,120 L160,120 L160,160 L220,160 L220,100 L280,100 L280,180 L340,180" 
          fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5"/>
    <path d="M120,80 L180,80 L180,200 L240,200 L240,60 L300,60" 
          fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Nodes -->
    <circle cx="160" cy="120" r="5" fill="#ffffff"/>
    <circle cx="220" cy="160" r="5" fill="#ffffff"/>
    <circle cx="220" cy="100" r="5" fill="#ffffff"/>
    <circle cx="280" cy="100" r="5" fill="#ffffff"/>
    <circle cx="280" cy="180" r="5" fill="#ffffff"/>
    <circle cx="180" cy="80" r="5" fill="#ffffff"/>
    <circle cx="240" cy="200" r="5" fill="#ffffff"/>
    <circle cx="240" cy="60" r="5" fill="#ffffff"/>
  </g>
  
  <!-- Business icons -->
  <g transform="translate(120, 70) scale(0.6)">
    <rect x="0" y="0" width="60" height="60" rx="10" fill="#ffffff" stroke="#00A0E3" stroke-width="2"/>
    <path d="M10,20 L50,20 M10,30 L50,30 M10,40 L30,40" fill="none" stroke="#00A0E3" stroke-width="2"/>
  </g>
  
  <g transform="translate(400, 260) scale(0.6)">
    <circle cx="30" cy="30" r="30" fill="#ffffff" stroke="#00A0E3" stroke-width="2"/>
    <path d="M20,30 L40,30 M30,20 L30,40" stroke="#00A0E3" stroke-width="3"/>
  </g>
  
  <g transform="translate(450, 70) scale(0.5)">
    <polygon points="30,0 60,30 30,60 0,30" fill="#ffffff" stroke="#00A0E3" stroke-width="2"/>
    <text x="30" y="35" font-family="Arial" font-size="20" fill="#00A0E3" text-anchor="middle">KI</text>
  </g>
</svg>
